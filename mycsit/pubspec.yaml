name: mycsit
description: "MyCSIT - Student Intelligence Platform for AITR CSIT Department"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.4
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  # Local database (Room-equivalent)
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  # File & media picking
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  # HTTP client for backend
  http: ^1.2.0
  # Permission handling
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
